# Server Config
server.port=8080
#server.servlet.context-path=/api

# Database Configuration
# spring.datasource.url=jdbc:mysql://localhost:3306/attendance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initial Data Seed Configuration (runs the schema script on first start if needed)
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.mode=always

# JWT Security Configurations
security.jwt.secret=======================EnterprisePayrollSystemSecretKeyJWTTokenSigning======================
# Token validation duration: 24 hours (86400000 ms)
security.jwt.expirationMs=86400000

# WhatsApp Cloud API Meta Config
whatsapp.api.url=https://graph.facebook.com/v18.0
whatsapp.api.phone-number-id=1215012891684507
whatsapp.api.access-token=YOUR_ACCESS_TOKEN
# Token that Meta will use to verify webhook requests
whatsapp.webhook.verify-token=my_secret_whatsapp_verify_token

# CORS Allowed Origins
app.cors.allowed-origins=http://localhost
#app.cors.allowed-origins=http://localhost:57217
# Logging Properties
logging.level.org.springframework.security=INFO
logging.level.com.system=DEBUG
